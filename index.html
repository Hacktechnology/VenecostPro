<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeneCost Pro</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); padding: 15px; color: #333; margin: 0; }
        
        /* Logo y Encabezado */
        .header { text-align: center; padding: 20px 0; background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d); border-radius: 0 0 25px 25px; margin: -15px -15px 20px -15px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 1.8em; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 5px 0 0; font-size: 0.8em; opacity: 0.9; }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        .status { font-size: 0.8em; text-align: center; margin-bottom: 10px; padding: 8px; border-radius: 8px; background: #eee; font-weight: bold; transition: 0.3s; }
        
        .btn-fetch { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .section-title { font-size: 0.9em; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }

        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.8em; color: #666; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(26,42,108,0.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn-calc { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-clear { width: 100%; padding: 10px; background: transparent; color: var(--danger); border: 2px solid var(--danger); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* Resultados con estilo */
        .result { margin-top: 25px; padding: 20px; border-radius: 15px; background: #fff; border: 2px solid var(--success); display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .venta-box { background: #f0fff4; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--success); margin: 15px 0; }
        .price-tag { font-size: 2.2em; color: var(--success); font-weight: 800; display: block; margin: 5px 0; }
        .bs-row { display: flex; justify-content: space-around; margin-top: 10px; font-weight: bold; font-size: 0.95em; }
        
        .ganancia-badge { background: var(--accent); color: #000; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="header">
    <h1>VeneCost Pro</h1>
    <p>Calculadora de Importación y Márgenes</p>
</div>

<div class="card">
    <div id="statusMsg" class="status">Sincroniza tasas para mayor precisión</div>
    <button class="btn-fetch" onclick="obtenerTasas()">🔄 SINCRONIZAR TASAS</button>

    <div class="section-title">Datos Cambiarios</div>
    <div class="grid">
        <div>
            <label>Tasa BCV</label>
            <input type="number" id="tasaBCV" placeholder="0.00" step="0.01">
        </div>
        <div>
            <label>Tasa Binance</label>
            <input type="number" id="tasaBinance" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div class="section-title">Detalle de Mercancía</div>
    <input type="text" id="nombreProd" placeholder="Nombre del Producto">
    
    <div class="grid">
        <div>
            <label>Costo Unitario ($)</label>
            <input type="number" id="costoUnit" placeholder="0.00">
        </div>
        <div>
            <label>Cantidad (Und)</label>
            <input type="number" id="unidades" placeholder="0">
        </div>
    </div>

    <div class="grid">
        <div>
            <label>Envío Total ($)</label>
            <input type="number" id="envio" placeholder="0.00">
        </div>
        <div>
            <label>Ganancia (%)</label>
            <input type="number" id="margen" value="30">
        </div>
    </div>

    <button class="btn-calc" onclick="calcular()">GENERAR PRECIO DE VENTA</button>
    <button class="btn-clear" onclick="limpiar()">BORRAR CAMPOS</button>

    <div id="resultado" class="result">
        <h3 id="displayNombre" style="text-align:center; color:var(--primary); margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 10px;"></h3>
        
        <div style="display:flex; justify-content: space-between; font-size: 0.9em;">
            <span>Costo Unit. Aterrizado:</span> <strong id="resUnitReal"></strong>
        </div>

        <div class="venta-box">
            <span style="font-size: 0.8em; color: #666; font-weight: bold;">PRECIO DE VENTA SUGERIDO</span>
            <span class="price-tag" id="resVentaDolar"></span>
            
            <div class="bs-row">
                <div style="color: var(--primary);">BCV: <span id="resVentaBCV"></span></div>
                <div style="color: var(--secondary);">P2P: <span id="resVentaP2P"></span></div>
            </div>
        </div>

        <div class="ganancia-badge">
            💰 GANANCIA NETA LOTE: <span id="resGananciaTotal"></span>
        </div>
    </div>
</div>

<script>
async function obtenerTasas() {
    const status = document.getElementById('statusMsg');
    status.innerText = "⏳ Sincronizando...";
    try {
        const response = await fetch('https://ve.dolarapi.com/v1/dolares');
        const data = await response.json();
        const oficial = data.find(d => d.nombre === "Oficial");
        const paralelo = data.find(d => d.nombre === "Paralelo");
        if(oficial) document.getElementById('tasaBCV').value = oficial.promedio;
        if(paralelo) document.getElementById('tasaBinance').value = paralelo.promedio;
        status.innerText = "✅ TASAS ACTUALIZADAS HOY";
        status.style.backgroundColor = "#d4edda";
        status.style.color = "#155724";
    } catch (e) {
        status.innerText = "⚠️ Error de red. Ingresa manual.";
        status.style.backgroundColor = "#f8d7da";
    }
}

function calcular() {
    const bcv = parseFloat(document.getElementById('tasaBCV').value) || 0;
    const binance = parseFloat(document.getElementById('tasaBinance').value) || 0;
    const costU = parseFloat(document.getElementById('costoUnit').value) || 0;
    const cant = parseFloat(document.getElementById('unidades').value) || 0;
    const envio = parseFloat(document.getElementById('envio').value) || 0;
    const margen = parseFloat(document.getElementById('margen').value) || 0;

    const costoTotalLote = (costU * cant) + envio;
    const costoUnitReal = cant > 0 ? (costoTotalLote / cant) : 0;
    const ventaDolarUnit = costoUnitReal * (1 + (margen/100));
    const gananciaTotal = (ventaDolarUnit * cant) - costoTotalLote;

    document.getElementById('displayNombre').innerText = document.getElementById('nombreProd').value.toUpperCase() || "PRODUCTO";
    document.getElementById('resUnitReal').innerText = "$" + costoUnitReal.toFixed(2);
    document.getElementById('resVentaDolar').innerText = "$" + ventaDolarUnit.toFixed(2);
    document.getElementById('resVentaBCV').innerText = (ventaDolarUnit * bcv).toLocaleString('es-VE') + " Bs";
    document.getElementById('resVentaP2P').innerText = (ventaDolarUnit * binance).toLocaleString('es-VE') + " Bs";
    document.getElementById('resGananciaTotal').innerText = "$" + gananciaTotal.toFixed(2);
    
    document.getElementById('resultado').style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function limpiar() {
    document.querySelectorAll('input').forEach(input => input.value = '');
    document.getElementById('margen').value = '30';
    document.getElementById('resultado').style.display = "none";
    document.getElementById('statusMsg').innerText = "Sincroniza tasas para mayor precisión";
    document.getElementById('statusMsg').style.backgroundColor = "#eee";
}
</script>

</body>
</html>
